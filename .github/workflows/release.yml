name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    name: Publish Windows build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore .\Montray.sln

      - name: Test
        run: dotnet test .\Montray.sln --configuration Release

      - name: Publish tray app
        run: >
          dotnet publish .\src\Montray\Montray.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output .\artifacts\publish
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Publish sensor service
        run: >
          dotnet publish .\src\Montray.Service\Montray.Service.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output .\artifacts\publish-service
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Package
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'
          $archive = "montray-$version-win-x64.zip"
          $packageDir = ".\artifacts\package"
          if (Test-Path $packageDir) {
            Remove-Item $packageDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $packageDir -Force | Out-Null

          Copy-Item .\artifacts\publish\montray.exe $packageDir
          Copy-Item .\artifacts\publish-service\montray-service.exe $packageDir
          New-Item -ItemType Directory -Path "$packageDir\scripts" -Force | Out-Null
          Copy-Item .\scripts\install-service.ps1 "$packageDir\scripts"
          Copy-Item .\scripts\uninstall-service.ps1 "$packageDir\scripts"
          Copy-Item .\docs\USER_GUIDE.txt "$packageDir\README.txt"
          Copy-Item .\LICENSE $packageDir
          Copy-Item .\THIRD_PARTY_NOTICES.md $packageDir
          Copy-Item .\docs\INSTALL.md "$packageDir\README.md"

          $forbiddenFiles = Get-ChildItem $packageDir -Recurse -Include *.cs,*.csproj,*.sln
          if ($forbiddenFiles) {
            $forbiddenFiles | ForEach-Object { Write-Error "Unexpected source file in package: $($_.FullName)" }
            exit 1
          }

          Compress-Archive -Path "$packageDir\*" -DestinationPath ".\artifacts\$archive" -Force
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .\artifacts\${{ env.ARCHIVE }}
          generate_release_notes: true
