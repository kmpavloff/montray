name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore .\Montray.sln

      - name: Build
        run: dotnet build .\Montray.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test .\Montray.sln --configuration Release --no-build
